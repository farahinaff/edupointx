<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>EduPointX Mobile</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Mobile-ready school rewards platform</p>
        <h1>EduPointX Mobile</h1>
        <p class="hero-copy">
          A mobile-first Progressive Web App for student points, class insights and rewards.
        </p>
      </section>

      <section class="panel auth-panel" id="authPanel">
        <div class="tabs">
          <button class="tab active" data-tab="login">Login</button>
          <button class="tab" data-tab="signup">Sign Up</button>
        </div>

        <form id="loginForm" class="stack">
          <label>
            Username
            <input type="text" name="username" required />
          </label>
          <label>
            Password
            <input type="password" name="password" required />
          </label>
          <button type="submit" class="primary">Continue</button>
          <p class="hint">Demo accounts: `ali`, `hassan`, `aishah` with password `password123`.</p>
        </form>

        <form id="signupForm" class="stack hidden">
          <label>
            Full name
            <input type="text" name="full_name" required />
          </label>
          <label>
            Username
            <input type="text" name="username" required />
          </label>
          <label>
            Password
            <input type="password" name="password" minlength="6" required />
          </label>
          <label>
            Role
            <select name="role" id="signupRole">
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
            </select>
          </label>
          <label id="classField">
            Class
            <select name="class_name" id="classSelect"></select>
          </label>
          <button type="submit" class="primary">Create Account</button>
        </form>
        <p id="authMessage" class="message"></p>
      </section>

      <section id="dashboard" class="hidden"></section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
